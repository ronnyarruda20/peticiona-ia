spring.application.name=peticiona-api

# Railway injeta PORT no ambiente; 8080 é o default local.
server.port=${PORT:8080}

# Serve o front Angular compilado (copiado para static/ no build do Docker)
spring.web.resources.static-locations=classpath:/static/

# Health check para o Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Datas em ISO-8601, nunca em timestamp numérico
spring.jackson.serialization.write-dates-as-timestamps=false

# URL da pesquisa de validação (Google Forms). Definida em Variables no Railway:
#   PETICIONA_PESQUISAURL=https://forms.gle/...
# Vazia = o convite não aparece na página.
peticiona.pesquisa-url=${PETICIONA_PESQUISAURL:}

# ── Banco ─────────────────────────────────────────────────────────
# O DATABASE_URL do Railway vem como postgresql://user:senha@host/db, que o driver
# JDBC não aceita. Por isso a URL é montada aqui a partir das variáveis PG*, que o
# Railway expõe separadas. Os defaults servem para rodar local com um Postgres em Docker.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:peticiona}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}

# O Flyway é o dono do schema. O Hibernate valida contra ele e falha na subida se
# divergirem — melhor não subir do que subir gravando errado.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# O spring-session-jdbc cria as tabelas de sessão antes do Flyway rodar, então o schema
# nunca está vazio no primeiro deploy e o Flyway se recusa a migrar. O baseline resolve —
# mas tem de ser na versão ZERO: com o padrão (1), o Flyway marcaria a V1 como já aplicada
# e pularia justamente a migração que cria usuarios, processos e intimacoes.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Sessão no banco: sobrevive a redeploy, que no Railway acontece o tempo todo.
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# ── Login com Google ──────────────────────────────────────────────
# Credenciais criadas no Google Cloud Console.
#
# O default NÃO é vazio de propósito: o Spring recusa subir com client-id em branco, e
# derrubar a aplicação inteira por falta de uma variável levaria junto a calculadora de
# prazos, que é pública e não depende de login. Com o valor de sentinela a aplicação sobe,
# a calculadora atende, e o AvisoDeConfiguracao registra no log que o login está desligado.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:nao-configurado}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:nao-configurado}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Segredo compartilhado com o n8n para o callback do fluxo de IA. Vazio = o
# endpoint recusa tudo, em vez de aceitar tudo.
peticiona.callback-token=${N8N_CALLBACK_TOKEN:}
